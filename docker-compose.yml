name: browserclaw

services:
  # ─── Object Storage ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - internal

  # ─── Reverse Proxy ──────────────────────────────────────────────
  traefik:
    image: traefik:v3.4
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=browserclaw_public"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - public

  # ─── Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./src/Frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: "http://browser:5040"
      BACKEND_BU_URL: "http://browser-use:5041"
      BROWSER_INTERNAL_TOKEN: "${BROWSER_INTERNAL_TOKEN:-}"
      COMPARE_ENABLED: "${COMPARE_ENABLED:-}"
      COMPARE_GUID: "${COMPARE_GUID:-}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - public
      - internal

  # ─── browser-use sidecar ───────────────────────────────────────
  # Thin FastAPI wrapper around the OSS browser-use library that mirrors
  # the Browser service HTTP + SSE contract. Only started under the
  # `compare` profile — public deployments should run `docker compose up`
  # without this profile. BYOK-only (no server-side keys).
  browser-use:
    profiles: ["compare"]
    build:
      context: ./src/Services/BrowserUseAgent
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.browser-use.rule=PathPrefix(`/vnc-bu`)"
      - "traefik.http.routers.browser-use.entrypoints=web"
      - "traefik.http.routers.browser-use.priority=10"
      - "traefik.http.routers.browser-use.middlewares=strip-vnc-bu"
      - "traefik.http.middlewares.strip-vnc-bu.stripprefix.prefixes=/vnc-bu"
      - "traefik.http.services.browser-use.loadbalancer.server.port=6080"
    networks:
      - public
      - internal

  # ─── Browser Service ───────────────────────────────────────────
  browser:
    build:
      context: ./src/Services/Browser
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./src/Services/Browser/.env.local
    environment:
      PORT: "5040"
      BROWSER_HEADLESS: "false"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_BUCKET: "browserclaw-skills"
      PROMPT_LOG_DIR: "/app/data/prompts"
    volumes:
      - prompt_logs:/app/data/prompts
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.browser.rule=PathPrefix(`/vnc`)"
      - "traefik.http.routers.browser.entrypoints=web"
      - "traefik.http.routers.browser.priority=10"
      - "traefik.http.routers.browser.middlewares=strip-vnc"
      - "traefik.http.middlewares.strip-vnc.stripprefix.prefixes=/vnc"
      - "traefik.http.services.browser.loadbalancer.server.port=6080"
    networks:
      - public
      - internal

volumes:
  minio_data:
  prompt_logs:

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
