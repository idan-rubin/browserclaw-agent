# browserclaw on k8s (converted from docker-compose). Images: mrrubin/browserclaw-* (public).
# minio (skills) + browser (Chromium+VNC) + frontend (Next.js). Ingress: browserclaw.org.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: minio-data, namespace: browserclaw }
spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: 1Gi } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: minio, namespace: browserclaw, labels: { app: minio } }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          envFrom: [{ secretRef: { name: browserclaw-secrets } }]
          ports: [{ containerPort: 9000 }]
          volumeMounts: [{ name: data, mountPath: /data }]
          resources: { requests: { cpu: "25m", memory: "96Mi" }, limits: { cpu: "500m", memory: "256Mi" } }
      volumes: [{ name: data, persistentVolumeClaim: { claimName: minio-data } }]
---
apiVersion: v1
kind: Service
metadata: { name: minio, namespace: browserclaw }
spec: { selector: { app: minio }, ports: [{ port: 9000, targetPort: 9000 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: browser, namespace: browserclaw, labels: { app: browser } }
spec:
  replicas: 1
  selector: { matchLabels: { app: browser } }
  template:
    metadata: { labels: { app: browser } }
    spec:
      containers:
        - name: browser
          image: mrrubin/browserclaw-browser:81b71e3d
          envFrom: [{ secretRef: { name: browserclaw-secrets } }]
          env:
            - { name: PORT, value: "5040" }
            - { name: BROWSER_HEADLESS, value: "false" }
            - { name: MINIO_ENDPOINT, value: "http://minio:9000" }
            - { name: MINIO_BUCKET, value: "browserclaw-skills" }
            - { name: PROMPT_LOG_DIR, value: "/app/data/prompts" }
          ports: [{ containerPort: 5040, name: api }, { containerPort: 6080, name: vnc }]
          volumeMounts: [{ name: prompts, mountPath: /app/data/prompts }]
          resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "1500m", memory: "1536Mi" } }
      volumes: [{ name: prompts, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: browser, namespace: browserclaw }
spec:
  selector: { app: browser }
  ports: [{ name: api, port: 5040, targetPort: 5040 }, { name: vnc, port: 6080, targetPort: 6080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend, namespace: browserclaw, labels: { app: frontend } }
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: mrrubin/browserclaw-frontend:81b71e3d
          env:
            - { name: BACKEND_URL, value: "http://browser:5040" }
          envFrom: [{ secretRef: { name: browserclaw-secrets } }]
          ports: [{ containerPort: 3000 }]
          resources: { requests: { cpu: "25m", memory: "96Mi" }, limits: { cpu: "500m", memory: "384Mi" } }
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: browserclaw }
spec: { selector: { app: frontend }, ports: [{ port: 3000, targetPort: 3000 }] }
---
# strip /vnc prefix before forwarding to the browser VNC port
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: strip-vnc, namespace: browserclaw }
spec: { stripPrefix: { prefixes: ["/vnc"] } }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: browserclaw-ingress
  namespace: browserclaw
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: browserclaw-strip-vnc@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: browserclaw.org
      http:
        paths:
          - { path: /vnc, pathType: Prefix, backend: { service: { name: browser, port: { number: 6080 } } } }
          - { path: /, pathType: Prefix, backend: { service: { name: frontend, port: { number: 3000 } } } }
  tls:
    - hosts: [browserclaw.org]
      secretName: browserclaw-tls
